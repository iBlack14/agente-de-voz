<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ViaAI | Modo Avanzado</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <script src="js/tailwind.config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen">
    <!-- Toggle Button -->
    <div class="fixed top-4 right-4 z-[90]">
        <button id="ui-mode-toggle" class="text-xs bg-gray-800 text-white px-3 py-1.5 rounded-full hover:bg-gray-700 transition">
            Cambiar a Modo Simple
        </button>
    </div>

    <!-- Advanced Mode Content -->
    <div class="fixed inset-0 bg-background pointer-events-none z-0"></div>
    <div id="advanced-root" class="relative z-10"></div>

    <script src="js/dashboard-loader.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('ui-mode-toggle');
            
            toggleBtn.addEventListener('click', () => {
                localStorage.setItem('ui-mode', 'simple');
                window.location.href = '/simple.html';
            });
        });
    </script>
</body>
</html>
