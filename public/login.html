<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ViaAI Voice - Login</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0d1629 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            opacity: 0;
            animation: slideDown 0.6s ease-out forwards;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            opacity: 0;
            animation: slideDown 0.6s ease-out 0.1s forwards;
        }

        .logo-subtitle {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0;
            animation: slideDown 0.6s ease-out 0.2s forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: rgba(2, 6, 23, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .form-input:focus {
            outline: none;
            background: rgba(14, 165, 233, 0.05);
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .form-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 20px;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .form-input-wrapper:has(.form-input:focus) .form-icon {
            color: #0ea5e9;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #cbd5e1;
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 24px;
            color: #fca5a5;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            animation: shake 0.4s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #06b6d4, #0284c7);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(14, 165, 233, 0.3);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #64748b;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .logo-title {
                font-size: 24px;
            }

            .form-group {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo">
                    <img src="assets/logo.png" alt="ViaAI" class="logo-img">
                </div>
                <h1 class="logo-title">ViaAI Voice</h1>
                <p class="logo-subtitle">SECURE ACCESS</p>
            </div>

            <!-- Form -->
            <form id="login-form">
                <!-- Error Message -->
                <div id="error-msg" class="error-message"></div>

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="form-input-wrapper">
                        <span class="material-symbols-rounded form-icon">person</span>
                        <input 
                            id="username" 
                            type="text" 
                            class="form-input" 
                            placeholder="Ingresa tu usuario"
                            autocomplete="off"
                            required
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="form-input-wrapper">
                        <span class="material-symbols-rounded form-icon">lock</span>
                        <input 
                            id="password" 
                            type="password" 
                            class="form-input" 
                            placeholder="Ingresa tu contraseña"
                            autocomplete="off"
                            required
                        >
                        <button type="button" id="toggle-pw" class="toggle-password">
                            <span class="material-symbols-rounded" style="font-size: 20px;">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="submit-btn">
                    <span>ACCEDER</span>
                    <span class="material-symbols-rounded" style="font-size: 20px;">arrow_forward</span>
                </button>
            </form>

            <!-- Footer -->
            <p class="footer-text">© 2026 ViaAI. Todos los derechos reservados.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePwBtn = document.getElementById('toggle-pw');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        // Toggle password visibility
        togglePwBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePwBtn.innerHTML = `<span class="material-symbols-rounded" style="font-size: 20px;">${isPassword ? 'visibility' : 'visibility_off'}</span>`;
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showError('Por favor completa todos los campos');
                return;
            }

            errorMsg.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>AUTENTICANDO...</span>';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Success animation
                    submitBtn.classList.add('success');
                    submitBtn.innerHTML = '<span>ACCESO CONCEDIDO</span><span class="material-symbols-rounded" style="font-size: 20px;">check_circle</span>';
                    
                    // Fade out and redirect
                    document.querySelector('.login-container').style.opacity = '0';
                    document.querySelector('.login-container').style.transform = 'scale(0.95)';
                    document.querySelector('.login-container').style.transition = 'all 0.4s ease';
                    
                    setTimeout(() => {
                        window.location.href = '/selection';
                    }, 600);
                } else {
                    throw new Error(data.message || 'Credenciales inválidas');
                }
            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>ACCEDER</span><span class="material-symbols-rounded" style="font-size: 20px;">arrow_forward</span>';
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 4000);
        }

        // Focus on username input on load
        window.addEventListener('load', () => {
            usernameInput.focus();
        });
    </script>
</body>
</html>
