<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ViaAI | Secure Access</title>
    
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    
    <!-- Tailwind & Motion -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/pvh-motion@latest/dist/motion.js"></script> <!-- Motion (Vanilla Framer Motion) -->
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#6366f1',
                        accent: '#f43f5e',
                        dark: {
                            900: '#020617',
                            800: '#0f172a',
                            700: '#1e293b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.05);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.1);
        }

        .button-glow {
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .button-glow::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
            animation: rotate 4s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Abstract Background Decor -->
    <div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-500/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <main id="main-container" class="relative w-full max-w-[420px] opacity-0 translate-y-4">
        
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10">
            <div id="logo-wrapper" class="w-20 h-20 mb-6 relative">
                <div class="absolute inset-0 bg-blue-500/20 blur-2xl rounded-full"></div>
                <img src="assets/logo.png" alt="ViaAI" class="relative w-full h-full object-contain">
            </div>
            <h1 class="text-3xl font-outfit font-bold tracking-tight text-white mb-2">ViaAI Voice</h1>
            <p class="text-slate-400 text-sm font-medium tracking-widest uppercase">Secure Node Portal</p>
        </div>

        <!-- Card -->
        <div class="glass-panel p-10 rounded-[2rem] relative overflow-hidden">
            <div class="shimmer absolute inset-0 pointer-events-none"></div>
            
            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-2">Node Identity</label>
                    <div class="relative group">
                        <span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">hub</span>
                        <input id="username" type="text" placeholder="username" class="input-field w-full h-14 pl-12 pr-4 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:ring-0">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-2">Neural Key</label>
                    <div class="relative group">
                        <span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">key</span>
                        <input id="password" type="password" placeholder="••••••••" class="input-field w-full h-14 pl-12 pr-12 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:ring-0">
                        <button type="button" id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 hover:text-white transition-colors">
                            <span class="material-symbols-rounded text-xl">visibility</span>
                        </button>
                    </div>
                </div>

                <div id="error-msg" class="hidden text-rose-500 text-[11px] font-semibold uppercase tracking-wider text-center bg-rose-500/5 py-3 rounded-xl border border-rose-500/10">
                    Access Denied: Invalid Credentials
                </div>

                <button type="submit" id="submit-btn" class="button-glow w-full h-14 bg-primary text-slate-950 font-bold rounded-2xl flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all">
                    <span>AUTHENTICATE</span>
                    <span class="material-symbols-rounded">arrow_forward</span>
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-[10px] text-slate-500 uppercase tracking-[0.3em] font-medium">Via Comunicativa © 2026</p>
    </main>

    <script>
        // Use Motion library for entrance
        window.onload = () => {
            const container = document.getElementById('main-container');
            
            // Minimalist entrance using native CSS + simple delay for compatibility
            container.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);

            // Subtle logo float
            const logo = document.getElementById('logo-wrapper');
            let angle = 0;
            function float() {
                angle += 0.02;
                logo.style.transform = `translateY(${Math.sin(angle) * 5}px)`;
                requestAnimationFrame(float);
            }
            float();
        };

        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        // Toggle Password
        document.getElementById('toggle-pw').addEventListener('click', function() {
            const input = document.getElementById('password');
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            this.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorMsg.classList.add('hidden');
            submitBtn.style.opacity = '0.7';
            submitBtn.disabled = true;

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await resp.json();
                
                if (resp.ok && data.success) {
                    submitBtn.innerHTML = '<span>ACCESS GRANTED</span>';
                    submitBtn.classList.replace('bg-primary', 'bg-emerald-500');
                    
                    document.getElementById('main-container').style.filter = 'blur(10px)';
                    document.getElementById('main-container').style.opacity = '0';
                    document.body.style.background = '#020617';
                    
                    setTimeout(() => {
                        window.location.href = '/selection';
                    }, 500);
                } else {
                    throw new Error(data.message || 'Login Failed');
                }
            } catch (err) {
                errorMsg.textContent = err.message.toUpperCase();
                errorMsg.classList.remove('hidden');
                submitBtn.style.opacity = '1';
                submitBtn.disabled = false;
                
                // Shake effect on error
                const card = form.parentElement;
                card.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });
    </script>
</body>
</html>
