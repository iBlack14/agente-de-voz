<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ViaAI | Neural Authorization</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Space_Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    
    <!-- Design System -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/tailwind.config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --primary: #d8b9ff;
            --secondary: #00eefc;
            --bg: #050505;
            --accent: #ae72ff;
        }

        /* Cinematic Background */
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(174, 114, 255, 0.05), transparent 80%),
                url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(5, 5, 5, 0.4) 0%, rgba(5, 5, 5, 0.95) 100%);
            z-index: 0;
        }

        /* Scanline Effect */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(216, 185, 255, 0.05), transparent);
            background-size: 100% 4px;
            z-index: 1;
            pointer-events: none;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Premium Input Styles */
        .premium-input-container {
            position: relative;
            background: rgba(10, 10, 10, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px) saturate(180%);
            overflow: hidden;
        }

        .premium-input-container::before {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; width: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .premium-input-container:focus-within {
            border-color: rgba(216, 185, 255, 0.3);
            background: rgba(216, 185, 255, 0.02);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        .premium-input-container:focus-within::before {
            width: 100%;
        }

        .premium-input {
            width: 100%;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 1.5rem 1.5rem 1.5rem 4rem !important;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .premium-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            transition: all 0.3s ease;
        }

        .premium-input:focus::placeholder {
            opacity: 0.5;
            transform: translateX(10px);
        }

        /* Input Scanning Line */
        .input-scan {
            position: absolute;
            top: 0; left: -100%; width: 40%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(216, 185, 255, 0.03), transparent);
            pointer-events: none;
        }

        .premium-input-container:focus-within .input-scan {
            animation: input-scan 2s infinite linear;
        }

        @keyframes input-scan {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        /* Brand Header Glitch */
        .glitch-logo {
            text-shadow: 0 0 20px rgba(216, 185, 255, 0.4);
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Button Prismatic Upgrade */
        .btn-prismatic {
            position: relative;
            background: linear-gradient(135deg, #ae72ff, #00eefc);
            color: #050505;
            font-weight: 900;
            padding: 1.25rem;
            border-radius: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 45px -10px rgba(174, 114, 255, 0.4);
        }

        .btn-prismatic:hover {
            letter-spacing: 0.4em;
            box-shadow: 0 20px 60px -5px rgba(174, 114, 255, 0.6);
            transform: scale(1.02);
        }

        /* Hide scrollbar */
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; overflow: hidden; }
    </style>
</head>
<body class="text-white font-body min-h-screen flex items-center justify-center p-6 selection:bg-primary/30">

    <div class="scanline"></div>

    <main class="relative z-10 w-full max-w-md flex flex-col items-center">
        <!-- Brand Header -->
        <div class="mb-14 flex flex-col items-center group cursor-default">
            <div class="relative w-24 h-24 mb-8">
                <div class="absolute inset-0 bg-primary/30 blur-[40px] rounded-full animate-pulse"></div>
                <div class="relative w-full h-full bg-gradient-to-br from-primary via-accent to-secondary rounded-[2.5rem] flex items-center justify-center border border-white/20 shadow-[0_0_50px_rgba(216,185,255,0.3)] transition-transform duration-700 group-hover:scale-110">
                    <span class="material-symbols-rounded text-bg text-5xl" style="font-variation-settings: 'FILL' 1;">hub</span>
                </div>
            </div>
            <h1 class="text-6xl font-black tracking-tighter glitch-logo mb-3">ViaAI</h1>
            <p class="font-label text-xs tracking-[1em] uppercase text-primary font-bold opacity-70">Neural Matrix Auth</p>
        </div>

        <!-- Login Matrix -->
        <div class="glass-card-login rounded-[3rem] p-12 w-full border border-white/10 bg-black/5 backdrop-blur-3xl relative overflow-hidden group shadow-2xl">
            <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
            
            <div class="text-center mb-12">
                <h2 class="font-headline text-3xl font-black tracking-tight text-white mb-2">Identificación</h2>
                <div class="h-1 w-10 bg-primary/40 mx-auto rounded-full mb-4"></div>
                <p class="text-zinc-500 text-[10px] font-label uppercase tracking-[0.4em] font-bold">Iniciando Protocolo de Acceso</p>
            </div>

            <form id="login-form" class="space-y-8">
                <!-- Field: Node Identity -->
                <div class="premium-input-container">
                    <div class="input-scan"></div>
                    <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none z-10">
                        <span class="material-symbols-rounded text-primary/40 text-2xl group-focus-within:text-primary transition-colors">fingerprint</span>
                    </div>
                    <input id="username-input" name="username" class="premium-input" placeholder="Identificador de Nodo" type="text" required autocomplete="username"/>
                </div>

                <!-- Field: Neural Key -->
                <div class="premium-input-container">
                    <div class="input-scan"></div>
                    <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none z-10">
                        <span class="material-symbols-rounded text-secondary/40 text-2xl group-focus-within:text-secondary transition-colors">encrypted</span>
                    </div>
                    <input id="password-input" name="password" class="premium-input" placeholder="Clave Neural de Acceso" type="password" required autocomplete="current-password"/>
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-5 flex items-center text-white/10 hover:text-primary transition-colors focus:outline-none z-10">
                        <span class="material-symbols-rounded text-xl">visibility</span>
                    </button>
                </div>

                <div id="login-error" class="hidden text-error text-[10px] font-black uppercase tracking-[0.2em] text-center bg-red-500/10 py-5 rounded-3xl border border-red-500/20 animate-pulse">
                    Acceso Denegado: Protocolo Inválido
                </div>

                <!-- Action Button -->
                <div class="pt-6">
                    <button id="submit-btn" class="w-full btn-prismatic flex items-center justify-center gap-4 transition-all duration-300" type="submit">
                        <span id="btn-text">CONECTAR NODO</span>
                        <span class="material-symbols-rounded text-xl">bolt</span>
                    </button>
                </div>
            </form>
        </div>

        <footer class="mt-20 flex flex-col items-center gap-6">
            <div class="h-px w-12 bg-white/10"></div>
            <p class="font-label text-[10px] tracking-[0.8em] uppercase text-zinc-600 font-bold">© 2024 VIAAI NEURAL SYSTEMS • REV-10</p>
        </footer>
    </main>

    <script>
        const form = document.getElementById('login-form');
        const userIn = document.getElementById('username-input');
        const passIn = document.getElementById('password-input');
        const loginError = document.getElementById('login-error');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');

        // Toggle Password
        const toggleBtn = document.getElementById('toggle-password');
        toggleBtn.addEventListener('click', () => {
            const isPass = passIn.type === 'password';
            passIn.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            loginError.classList.add('hidden');
            btnText.textContent = 'AUTENTICANDO...';
            submitBtn.disabled = true;

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: userIn.value, 
                        password: passIn.value 
                    })
                });
                
                const data = await resp.json();
                
                if (resp.ok && data.success) {
                    btnText.textContent = 'ACCESO CONCEDIDO';
                    document.body.style.filter = 'brightness(2)';
                    document.body.style.transition = 'filter 1s ease';
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 800);
                } else {
                    throw new Error(data.message || 'Fallo de Autorización');
                }
            } catch (err) {
                loginError.textContent = `${err.message.toUpperCase()}`;
                loginError.classList.remove('hidden');
                btnText.textContent = 'REINTENTAR ENLACE';
                submitBtn.disabled = false;
                
                form.parentElement.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 400, iterations: 1 });
            }
        });
    </script>
</body>
</html>
