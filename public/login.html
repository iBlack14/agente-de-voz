<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ViaBox | Acceso</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #070114;
            --surface: rgba(20, 3, 33, 0.78);
            --surface-strong: rgba(31, 4, 48, 0.92);
            --border: rgba(207, 0, 218, 0.26);
            --border-soft: rgba(255, 255, 255, 0.08);
            --primary: #cf00da;
            --primary-hover: #e033ea;
            --secondary: #7c3aed;
            --text: #f5f2ff;
            --text-dim: #a59ab9;
            --error: #f87171;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 18% 20%, rgba(207, 0, 218, 0.22) 0%, transparent 32%),
                radial-gradient(circle at 80% 15%, rgba(124, 58, 237, 0.18) 0%, transparent 28%),
                radial-gradient(circle at 72% 78%, rgba(207, 0, 218, 0.12) 0%, transparent 30%),
                linear-gradient(180deg, #090113 0%, #12011b 46%, #070114 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            overflow: hidden;
        }

        .background-grid,
        .background-frame {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .background-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at center, black 38%, transparent 85%);
            opacity: 0.55;
        }

        .background-frame::before,
        .background-frame::after {
            content: "";
            position: absolute;
            border: 1px solid rgba(207, 0, 218, 0.14);
            border-radius: 32px;
        }

        .background-frame::before {
            inset: 24px;
        }

        .background-frame::after {
            inset: 72px 88px;
            border-color: rgba(124, 58, 237, 0.12);
        }

        .login-shell {
            position: relative;
            width: min(1040px, 100%);
            display: grid;
            grid-template-columns: minmax(320px, 1.1fr) minmax(360px, 420px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-soft);
            background: rgba(7, 1, 20, 0.45);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(20px);
        }

        .brand-panel {
            position: relative;
            padding: 56px 52px;
            background:
                linear-gradient(160deg, rgba(207, 0, 218, 0.1) 0%, rgba(16, 2, 28, 0.18) 45%, rgba(10, 1, 24, 0.92) 100%),
                url('assets/logo.png') no-repeat right 46px bottom 46px / 120px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 620px;
        }

        .brand-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(207, 0, 218, 0.18) 0%, transparent 34%),
                radial-gradient(circle at 80% 78%, rgba(124, 58, 237, 0.16) 0%, transparent 32%);
            pointer-events: none;
        }

        .brand-block,
        .brand-footer {
            position: relative;
            z-index: 1;
        }

        .brand-mark {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 0;
            text-align: center;
        }

        .brand-icon {
            width: 112px;
            height: 112px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-name {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .brand-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #c4b5fd;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            position: absolute;
            left: 52px;
            bottom: 46px;
        }

        .brand-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #34d399;
            box-shadow: 0 0 18px rgba(52, 211, 153, 0.45);
        }

        .login-panel {
            padding: 44px 40px;
            background: linear-gradient(180deg, rgba(24, 4, 37, 0.96) 0%, rgba(11, 2, 22, 0.98) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(207, 0, 218, 0.1);
            border: 1px solid rgba(207, 0, 218, 0.2);
            color: #f0abfc;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .panel-title {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }

        .panel-copy {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .error-message {
            display: none;
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fecaca;
            font-size: 13px;
            font-weight: 600;
        }

        .error-message.show {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b7ba8;
            font-size: 20px;
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .form-input {
            width: 100%;
            padding: 15px 46px 15px 48px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #75688e;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(207, 0, 218, 0.55);
            background: rgba(207, 0, 218, 0.05);
            box-shadow: 0 0 0 3px rgba(207, 0, 218, 0.12);
        }

        .form-input-wrapper:has(.form-input:focus) .form-icon {
            color: #f0abfc;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #8b7ba8;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .toggle-password:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }

        .submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 15px 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #ff00ea);
            color: white;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(207, 0, 218, 0.28);
            transition: all 0.2s ease;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            background: linear-gradient(135deg, var(--primary-hover), #ff33ef);
            box-shadow: 0 16px 34px rgba(207, 0, 218, 0.36);
        }

        .submit-btn:disabled {
            opacity: 0.72;
            cursor: not-allowed;
        }

        .submit-btn.success {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 14px 28px rgba(16, 185, 129, 0.28);
        }

        .footer-text {
            margin-top: 20px;
            text-align: center;
            color: #7d7193;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        @media (max-width: 920px) {
            body {
                padding: 18px;
            }

            .login-shell {
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: auto;
                padding: 36px 28px;
                background:
                    linear-gradient(160deg, rgba(207, 0, 218, 0.1) 0%, rgba(16, 2, 28, 0.18) 45%, rgba(10, 1, 24, 0.92) 100%);
            }

            .brand-footer {
                position: static;
                margin-top: 32px;
            }

            .login-panel {
                padding: 30px 24px 28px;
            }

            .background-frame::after {
                inset: 56px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="background-frame"></div>

    <div class="login-shell">
        <section class="brand-panel">
            <div class="brand-block">
                <div class="brand-mark">
                    <div class="brand-icon">
                        <img src="assets/logo.png" alt="ViaBox">
                    </div>
                    <div class="brand-name">ViaBox</div>
                </div>
            </div>

            <div class="brand-footer">
                <span class="brand-dot"></span>
                <span>Sistema Operativo Activo</span>
            </div>
        </section>

        <section class="login-panel">
            <div class="panel-chip">
                <span class="material-symbols-rounded" style="font-size:16px;">lock</span>
                <span>ViaBox</span>
            </div>
            <h2 class="panel-title">Iniciar sesión</h2>
            <p class="panel-copy">Accede con tu usuario y contraseña para entrar al panel.</p>

            <form id="login-form">
                <div id="error-msg" class="error-message"></div>

                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="form-input-wrapper">
                        <span class="material-symbols-rounded form-icon">person</span>
                        <input
                            id="username"
                            type="text"
                            class="form-input"
                            placeholder="Ingresa tu usuario"
                            autocomplete="off"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="form-input-wrapper">
                        <span class="material-symbols-rounded form-icon">lock</span>
                        <input
                            id="password"
                            type="password"
                            class="form-input"
                            placeholder="Ingresa tu contraseña"
                            autocomplete="off"
                            required
                        >
                        <button type="button" id="toggle-pw" class="toggle-password">
                            <span class="material-symbols-rounded" style="font-size: 20px;">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">
                    <span>Acceder</span>
                    <span class="material-symbols-rounded" style="font-size: 20px;">arrow_forward</span>
                </button>
            </form>

            <p class="footer-text">© 2026 ViaBox. Todos los derechos reservados.</p>
        </section>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePwBtn = document.getElementById('toggle-pw');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        togglePwBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePwBtn.innerHTML = `<span class="material-symbols-rounded" style="font-size: 20px;">${isPassword ? 'visibility' : 'visibility_off'}</span>`;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showError('Por favor completa todos los campos');
                return;
            }

            errorMsg.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Autenticando...</span>';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    submitBtn.classList.add('success');
                    submitBtn.innerHTML = '<span>Acceso concedido</span><span class="material-symbols-rounded" style="font-size: 20px;">check_circle</span>';

                    document.querySelector('.login-shell').style.opacity = '0';
                    document.querySelector('.login-shell').style.transform = 'scale(0.98)';
                    document.querySelector('.login-shell').style.transition = 'all 0.35s ease';

                    setTimeout(() => {
                        window.location.href = '/selection';
                    }, 500);
                } else {
                    throw new Error(data.message || 'Credenciales inválidas');
                }
            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Acceder</span><span class="material-symbols-rounded" style="font-size: 20px;">arrow_forward</span>';
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 4000);
        }

        window.addEventListener('load', () => {
            usernameInput.focus();
        });
    </script>
</body>
</html>
